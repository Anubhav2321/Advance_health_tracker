<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioNexus | Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Favicon Link -->
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        /* --- Global Resets & Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #0f1115;
            --surface-dark: #181b21;
            --accent-cyan: #00f3ff;
            --accent-green: #00ff87;
            --text-primary: #f8f9fa;
            --text-secondary: #a0a6b1;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Mobile App Container --- */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top, rgba(0, 243, 255, 0.05), transparent 50%), var(--bg-dark);
        }

        /* --- Login Interface --- */
        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 30px;
            z-index: 10;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-logo span {
            color: var(--accent-cyan);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .brand-logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .auth-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        /* --- Input Fields --- */
        .input-group {
            position: relative;
            transition: all 0.3s ease;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            background: var(--surface-dark);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 16px 16px 16px 45px;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.2);
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
        }

        /* Google Custom Button CSS */
        .btn-google {
            background: var(--surface-dark);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-google img {
            width: 22px;
            height: 22px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 10px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .divider:not(:empty)::before { margin-right: 10px; }
        .divider:not(:empty)::after { margin-left: 10px; }

        .toggle-auth {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .toggle-btn-text {
            color: var(--accent-cyan);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .toggle-btn-text:hover {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* --- Loading Overlay --- */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 255, 135, 0.15);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .hourglass {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }

        .hourglass:after {
            content: " ";
            display: block;
            border-radius: 50%;
            width: 0;
            height: 0;
            margin: 8px;
            box-sizing: border-box;
            border: 32px solid var(--accent-green);
            border-color: var(--accent-green) transparent var(--accent-green) transparent;
            animation: hourglass-anim 1.2s infinite;
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.5);
        }

        @keyframes hourglass-anim {
            0% { transform: rotate(0); animation-timing-function: cubic-bezier(0.55, 0.055, 0.675, 0.19); }
            50% { transform: rotate(900deg); animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
            100% { transform: rotate(1800deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: var(--accent-green);
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 135, 0.5);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="login-content" id="login-ui">
            <div class="brand-logo">
                <h1>Bio<span>Nexus</span></h1>
                <p>Advanced AI Health Architecture</p>
            </div>

            <div class="auth-section">
                <h2 class="auth-title" id="form-title">Access your account</h2>
                
                <form id="auth-form">
                    <div class="input-group" id="name-field" style="display: none; margin-bottom: 16px;">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="name-input" placeholder="Full Name">
                    </div>

                    <div class="input-group" style="margin-bottom: 16px;">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email-input" placeholder="Email Address" required>
                    </div>

                    <div class="input-group" style="margin-bottom: 24px;">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password-input" placeholder="Password" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        Initialize Link (Login)
                    </button>
                </form>

                <p class="toggle-auth">
                    <span id="toggle-prefix">Don't have an account? </span>
                    <span class="toggle-btn-text" id="toggle-btn">Create Account</span>
                </p>

                <div class="divider">OR</div>

                <!-- 🚨 FIX: Direct link to Backend Google OAuth Route -->
                <a href="/api/auth/google/login" style="text-decoration: none; display: block; width: 100%;">
                    <button type="button" class="btn btn-google" style="width: 100%;">
                        <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google">
                        Continue with Google
                    </button>
                </a>

                <p id="auth-error" style="color: #ff5e5e; text-align: center; display: none; margin-top: 15px; font-size: 0.9rem;"></p>
            </div>
        </div>

        <div class="loading-overlay" id="loading-screen">
            <div class="hourglass"></div>
            <p class="loading-text" id="loading-text">Authenticating...</p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('toggle-btn');
            const togglePrefix = document.getElementById('toggle-prefix');
            const nameField = document.getElementById('name-field');
            const formTitle = document.getElementById('form-title');
            const submitBtn = document.getElementById('submit-btn');
            const nameInput = document.getElementById('name-input');
            
            window.isLoginMode = true; 

            toggleBtn.addEventListener('click', () => {
                window.isLoginMode = !window.isLoginMode;
                
                if (window.isLoginMode) {
                    nameField.style.display = 'none';
                    nameInput.removeAttribute('required');
                    formTitle.innerText = "Access your account";
                    submitBtn.innerText = "Initialize Link (Login)";
                    togglePrefix.innerText = "Don't have an account? ";
                    toggleBtn.innerText = "Create Account";
                } else {
                    nameField.style.display = 'block';
                    nameInput.setAttribute('required', 'true');
                    formTitle.innerText = "Create new account";
                    submitBtn.innerText = "Create BioNexus Core";
                    togglePrefix.innerText = "Already have an account? ";
                    toggleBtn.innerText = "Login";
                }
            });
        });
    </script>

    <script src="js/auth.js"></script>
</body>
</html>
