<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioNexus | Settings</title>
    <meta name="description" content="BioNexus Settings - Customize your health tracker experience">
    
    <!-- Theme Loader (MUST be first) -->
    <script src="js/theme-loader.js"></script>

    <!-- Favicon Link -->
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* Settings Section */
        .settings-section {
            background: var(--surface-dark);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: var(--shadow-card);
        }

        .section-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-color);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .section-title-row i {
            font-size: 1.1rem;
        }

        /* Input Groups */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .input-group label {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: var(--border-radius-sm);
            outline: none;
            font-size: 0.92rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
            appearance: none;
            -webkit-appearance: none;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);
        }

        .input-group select option {
            background: var(--surface-dark);
            color: var(--text-primary);
        }

        .row-2 {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* ===== Theme Mode Selector ===== */
        .theme-mode-selector {
            display: flex;
            gap: 8px;
            background: var(--input-bg);
            border-radius: var(--border-radius-sm);
            padding: 4px;
            border: 1px solid var(--input-border);
        }

        .theme-mode-option {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: transparent;
            transition: all 0.3s ease !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .theme-mode-option i {
            font-size: 1rem;
        }

        .theme-mode-option.active {
            background: var(--surface-dark);
            color: var(--accent-color);
            box-shadow: var(--shadow-card);
        }

        [data-theme="light"] .theme-mode-option.active {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ===== Color Swatches ===== */
        .color-swatches {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease !important;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: var(--text-primary);
            transform: scale(1.1);
        }

        .color-swatch.active::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 0.8rem;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        .color-swatch[data-color="cyan"]   { background: #00f3ff; }
        .color-swatch[data-color="purple"] { background: #a855f7; }
        .color-swatch[data-color="green"]  { background: #22c55e; }
        .color-swatch[data-color="orange"] { background: #f97316; }
        .color-swatch[data-color="pink"]   { background: #ec4899; }
        .color-swatch[data-color="blue"]   { background: #3b82f6; }

        /* ===== Live Preview Card ===== */
        .live-preview {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--border-radius-sm);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preview-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
        }

        [data-theme="dark"] .preview-dot {
            box-shadow: 0 0 10px var(--accent-color);
        }

        .preview-text {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .preview-text strong {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* ===== Buttons ===== */
        .btn-primary {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease !important;
            margin-top: 6px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(var(--accent-rgb), 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            padding: 13px;
            border-radius: var(--border-radius-sm);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease !important;
            width: 100%;
        }

        .btn-outline:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.08);
            color: var(--danger-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 15px;
            border-radius: var(--border-radius-sm);
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease !important;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--danger-red);
        }

        #settings-content {
            display: none;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 30px;
        }

        /* Divider */
        .settings-divider {
            border: 0;
            border-top: 1px solid var(--glass-border);
            margin: 4px 0;
        }

        /* Password section */
        .pass-input {
            margin-top: 6px;
        }

        #pass-msg {
            font-size: 0.8rem;
            margin-top: 6px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="top-nav">
            <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2><i class="fa-solid fa-gear"></i> Settings</h2>
        </div>

        <div id="loading-spinner" class="loader">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading...
        </div>

        <div id="settings-content">
            
            <!-- Bio-Metrics Section -->
            <div class="settings-section">
                <div class="section-title-row">
                    <i class="fa-solid fa-user-astronaut"></i> Bio-Metrics
                </div>
                
                <div class="input-group">
                    <label>Fitness Goal</label>
                    <select id="set-goal">
                        <option value="weight_loss">Weight Loss</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="muscle_gain">Muscle Gain</option>
                    </select>
                </div>

                <div class="row-2">
                    <div class="input-group">
                        <label>Weight (Kg)</label>
                        <input type="number" id="set-weight" step="0.1" required>
                    </div>
                    <div class="input-group">
                        <label>Height (cm)</label>
                        <input type="number" id="set-height" required>
                    </div>
                </div>

                <div class="row-2">
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" id="set-age" required>
                    </div>
                    <div class="input-group">
                        <label>Gender</label>
                        <select id="set-gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Activity Level</label>
                    <select id="set-activity">
                        <option value="sedentary">Sedentary (Office Job)</option>
                        <option value="light">Lightly Active</option>
                        <option value="moderate">Moderately Active</option>
                        <option value="active">Very Active (Sports)</option>
                    </select>
                </div>
            </div>

            <!-- Interface & AI Section -->
            <div class="settings-section">
                <div class="section-title-row">
                    <i class="fa-solid fa-palette"></i> Interface & AI
                </div>
                
                <!-- Theme Mode -->
                <div class="input-group">
                    <label>UI Theme</label>
                    <div class="theme-mode-selector" id="theme-mode-selector">
                        <button class="theme-mode-option" data-mode="dark">
                            <i class="fa-solid fa-moon"></i>
                            Dark
                        </button>
                        <button class="theme-mode-option" data-mode="light">
                            <i class="fa-solid fa-sun"></i>
                            Light
                        </button>
                        <button class="theme-mode-option" data-mode="system">
                            <i class="fa-solid fa-laptop"></i>
                            System
                        </button>
                    </div>
                </div>

                <!-- Accent Color Swatches -->
                <div class="input-group">
                    <label>Accent Color</label>
                    <div class="color-swatches" id="color-swatches">
                        <div class="color-swatch" data-color="cyan" title="Neon Cyan"></div>
                        <div class="color-swatch" data-color="purple" title="Synthwave Purple"></div>
                        <div class="color-swatch" data-color="green" title="Matrix Green"></div>
                        <div class="color-swatch" data-color="orange" title="Sunset Orange"></div>
                        <div class="color-swatch" data-color="pink" title="Hot Pink"></div>
                        <div class="color-swatch" data-color="blue" title="Electric Blue"></div>
                    </div>
                </div>

                <!-- Live Preview -->
                <div class="live-preview">
                    <div class="preview-dot"></div>
                    <div class="preview-text">
                        Theme: <strong id="preview-theme-text">Cyber Dark</strong> · <strong id="preview-accent-text">Neon Cyan</strong>
                    </div>
                </div>

                <!-- RIA Settings -->
                <div class="row-2" style="margin-top: 4px;">
                    <div class="input-group">
                        <label>RIA's Tone</label>
                        <select id="set-ria-tone">
                            <option value="friendly">Friendly & Cute</option>
                            <option value="strict">Strict Coach</option>
                            <option value="professional">Professional</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>RIA's Language</label>
                        <select id="set-ria-lang">
                            <option value="english">English</option>
                            <option value="banglish">Banglish</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Save Button -->
            <button class="btn-primary" id="save-settings-btn">
                <i class="fa-solid fa-microchip"></i> Save Settings
            </button>

            <!-- Security Section -->
            <div class="settings-section">
                <div class="section-title-row" style="color: var(--text-secondary);">
                    <i class="fa-solid fa-shield-halved"></i> Security & Data
                </div>
                
                <div class="input-group">
                    <input type="password" id="old-pass" placeholder="Current Password" class="pass-input">
                    <input type="password" id="new-pass" placeholder="New Password" class="pass-input" style="margin-top: 6px;">
                    <button class="btn-outline" id="change-pass-btn" style="margin-top: 10px;">
                        <i class="fa-solid fa-key"></i> Update Password
                    </button>
                    <div id="pass-msg"></div>
                </div>
                
                <hr class="settings-divider">

                <button class="btn-outline" id="export-data-btn" style="color: var(--accent-color); border-color: rgba(var(--accent-rgb), 0.3);">
                    <i class="fa-solid fa-file-pdf"></i> Export Data as PDF
                </button>

                <button class="btn-danger" id="delete-account-btn">
                    <i class="fa-solid fa-skull"></i> Erase Account Permanently
                </button>
            </div>

        </div>
    </div>

    <script src="js/settings.js"></script>
</body>
</html>
