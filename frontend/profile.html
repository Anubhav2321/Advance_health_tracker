<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioNexus | Profile Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --bg-dark: #0f1115;
            --surface-dark: #181b21;
            --accent-cyan: #00f3ff;
            --accent-purple: #9d4edd;
            --accent-green: #00ff87;
            --text-primary: #f8f9fa;
            --text-secondary: #a0a6b1;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            background: radial-gradient(circle at top, rgba(0, 243, 255, 0.05), transparent 60%), var(--bg-dark);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-nav {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .back-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-primary);
            width: 40px; height: 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        .top-nav h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; color: var(--accent-cyan); }

        .profile-header {
            text-align: center;
            padding: 30px 20px;
            background: var(--surface-dark);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .profile-header::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
        }

        /* 💥 NEW: Avatar Wrapper & Upload Button Styles */
        .avatar-wrapper {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto 15px auto;
        }
        .avatar-circle {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(0, 243, 255, 0.05);
            border: 2px solid var(--accent-cyan);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 700; color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            overflow: hidden; /* Keeps image perfectly round */
        }
        .avatar-circle img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .upload-cam-btn {
            position: absolute;
            bottom: 0; right: 0;
            background: var(--surface-dark);
            color: var(--accent-cyan);
            border: 2px solid var(--accent-cyan);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .upload-cam-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .profile-header h3 { font-size: 1.5rem; margin-bottom: 5px; }
        .profile-header p { color: var(--text-secondary); font-size: 0.9rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-card {
            background: var(--surface-dark);
            padding: 18px;
            border-radius: 16px;
            border-left: 3px solid;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .stat-card.green { border-color: var(--accent-green); }
        .stat-card.purple { border-color: var(--accent-purple); }
        .stat-card.cyan { border-color: var(--accent-cyan); }
        .stat-card.red { border-color: #ff5e5e; }
        
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; display: block; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); text-transform: capitalize; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .edit-btn {
            width: 100%;
            background: rgba(0, 243, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .edit-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .logout-btn {
            width: 100%;
            background: rgba(255, 94, 94, 0.08);
            color: #ff5e5e;
            border: 1px solid rgba(255, 94, 94, 0.3);
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .logout-btn:hover {
            background: #ff5e5e;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 94, 94, 0.4);
        }
        .loader { text-align: center; padding: 50px; color: var(--accent-cyan); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="top-nav">
            <button class="back-btn" id="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
            <h2>System Identity</h2>
        </div>

        <div id="loading-spinner" class="loader">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Fetching Matrix...
        </div>

        <div id="profile-content" style="display: none; flex-direction: column; gap: 20px;">
            <div class="profile-header">
                
                <div class="avatar-wrapper">
                    <div class="avatar-circle">
                        <span id="profile-initial">U</span>
                    </div>
                    
                    <label for="image-upload" class="upload-cam-btn" title="Upload Profile Picture">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" style="display: none;">
                </div>

                <h3 id="profile-name">Loading...</h3>
                <p id="profile-email">synchronizing data...</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card green">
                    <span class="stat-label"><i class="fa-solid fa-fingerprint"></i> Age / Gender</span>
                    <div class="stat-value" id="profile-age">--</div>
                </div>
                <div class="stat-card purple">
                    <span class="stat-label"><i class="fa-solid fa-weight-scale"></i> Current Weight</span>
                    <div class="stat-value" id="profile-weight">-- kg</div>
                </div>
                <div class="stat-card cyan">
                    <span class="stat-label"><i class="fa-solid fa-bullseye"></i> Target Goal</span>
                    <div class="stat-value" id="profile-goal">--</div>
                </div>
                <div class="stat-card red">
                    <span class="stat-label"><i class="fa-solid fa-fire"></i> TDEE (Maintenance)</span>
                    <div class="stat-value" id="profile-tdee" style="color: #ff5e5e;">-- kcal</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="edit-btn" id="edit-profile-btn">
                    <i class="fa-solid fa-user-pen"></i> Edit Profile Data
                </button>
                
                <button class="logout-btn" id="logout-btn">
                    <i class="fa-solid fa-power-off"></i> Disconnect Core
                </button>
            </div>
        </div>

    </div>

    <script src="js/profile.js?v=2.1"></script>
</body>
</html>
